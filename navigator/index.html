<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Навігатор з посиланнями на всі курси" />

    <title>WebUniverse</title>

    <!-- ❗️ Фавіконка (зараз немає) -->
    <link rel="icon" href="" />

    <!-- Скрипт перемикання теми -->
    <script>
      const savedTheme = localStorage.getItem("wu_theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      const hljsThemeLink =
        savedTheme === "dark"
          ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
          : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css";

      document.write(
        `<link id="hljs-theme" rel="stylesheet" href="${hljsThemeLink}" />`,
      );
    </script>

    <!-- Підключення шрифтів (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />

    <!-- Підсвітка коду (Highlight.js) -->
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
    ></script>

    <!-- Власні стилі та скрипти -->
    <link rel="stylesheet" href="../template_01/style.css?v=4.1" />
    <link rel="stylesheet" href="./style.css?v=4.1" />
    <script src="../template_01/script.js?v=4.1" defer></script>
    <script src="./script.js?v=4.1" defer></script>
  </head>

  <body>
    <!-- "Завіса", яка плавно зникає при завантаженні сторінки -->
    <div class="transition-curtain"></div>

    <!-- Панель з навігацією -->
    <script>
      window.pageNavLinks = [
        {
          name: "Редактор",
          url: "https://editor.webuniverseua.com",
          newTab: true,
        },
      ];
    </script>
    <div id="nav-container"></div>

    <header>
      <h1>WebUniverse</h1>
      <p class="topic">Курси з розробки вебсайтів та відеоігор</p>
    </header>

    <main>
      <section class="accordion" id="current-courses-container"></section>

      <section class="accordion" id="old-courses-container"></section>
    </main>

    <footer>
      <p>© 2026 WebUniverse — Усі права захищені.</p>
    </footer>

    <!-- Кнопка для повернення на початок сторінки -->
    <button
      id="scrollToTopBtn"
      class="scroll-to-top"
      aria-label="Повернутися нагору"
    >
      🛸
    </button>

    <!-- Вікно для вводу пароля для сайту (зараз тестовий 1111) -->
    <dialog id="global-password-modal">
      <div class="modal-content">
        <h2>Вхід у WebUniverse</h2>
        <p class="modal-description">
          Введіть пароль для доступу до сайту:
        </p>
        <input
          type="password"
          id="global-password-input"
          placeholder="Введіть пароль сайту..."
        />
        <p id="global-password-error" class="error-text">
          Неправильний пароль!
        </p>

        <div class="modal-actions">
          <button id="global-submit-btn">Увійти</button>
        </div>
      </div>
    </dialog>

    <!-- Вікно для вводу паролів для курсів (зараз тестовий 1111) -->
    <dialog id="password-modal">
      <div class="modal-content">
        <h2>Щоб відкрити доступ до курсу, введіть пароль:</h2>
        <input
          type="password"
          id="password-input"
          placeholder="Введіть пароль..."
        />
        <p id="password-error" class="error-text">Неправильний пароль!</p>

        <div class="modal-actions">
          <button id="cancel-btn">Назад</button>
          <button id="submit-btn">ОК</button>
        </div>
      </div>
    </dialog>
  </body>
</html>
