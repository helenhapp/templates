<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Навігатор з посиланнями на всі курси" />

    <title>WebUniverse</title>

    <!-- ❗️ Фавіконка (зараз немає) -->
    <link rel="icon" href="" />

    <!-- Скрипт перемикання теми -->
    <script>
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
    </script>

    <!-- Підключення шрифтів (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />

    <!-- Підсвітка коду (Highlight.js) -->
    <link
      id="hljs-theme"
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
    ></script>

    <!-- Власні стилі та скрипти -->
    <link rel="stylesheet" href="../template_01/style.css?v=1.3" />
    <link rel="stylesheet" href="./style.css?v=1.3" />
    <script src="../template_01/script.js?v=1.3" defer></script>
    <script src="./script.js?v=1.3" defer></script>
  </head>

  <body>
    <!-- "Завіса", яка плавно зникає при завантаженні сторінки -->
    <div class="transition-curtain"></div>

    <nav class="top-bar">
      <div class="logo-container">
        <img
          src="../template_01/logo-light.svg"
          alt="WebUniverse Logo"
          class="site-logo logo-light"
        />
        <img
          src="../template_01/logo-dark.svg"
          alt="WebUniverse Logo"
          class="site-logo logo-dark"
        />
      </div>

      <div></div>

      <label class="toggle-switch" aria-label="Перемикач теми">
        <input type="checkbox" id="theme-checkbox" />
        <span class="slider">
          <span class="icon sun">☀️</span>
          <span class="icon moon">🌙</span>
        </span>
      </label>
    </nav>

    <header>
      <!-- Кнопка для тестування паролів -->
      <!-- <button onclick="localStorage.clear(); location.reload();" style="margin: 20px; opacity: 0.5">
        Скинути всі паролі (для тестів)
      </button> -->

      <h1>WebUniverse</h1>
      <p class="topic">Курси з розробки вебсайтів та відеоігор</p>
    </header>

    <main>
      <!-- <hr /> -->

      <section class="accordion" id="current-courses-container"></section>

      <section class="accordion" id="old-courses-container"></section>
    </main>

    <footer>
      <p>© 2026 WebUniverse — Усі права захищені.</p>
    </footer>

    <!-- Кнопка для повернення на початок сторінки -->
    <button
      id="scrollToTopBtn"
      class="scroll-to-top"
      aria-label="Повернутися нагору"
    >
      🛸
    </button>

    <!-- Вікно для вводу пароля для сайту (зараз тестовий 1111) -->
    <dialog id="global-password-modal">
      <div class="modal-content">
        <h2>Вхід у WebUniverse</h2>
        <p class="modal-description">
          Введіть загальний пароль для доступу до сайту:
        </p>
        <input
          type="password"
          id="global-password-input"
          placeholder="Введіть пароль сайту..."
        />
        <p id="global-password-error" class="error-text">
          Неправильний пароль!
        </p>

        <div class="modal-actions">
          <button id="global-submit-btn">Увійти</button>
        </div>
      </div>
    </dialog>

    <!-- Вікно для вводу паролів для курсів (зараз тестовий 1111) -->
    <dialog id="password-modal">
      <div class="modal-content">
        <h2>Щоб відкрити доступ до курсу, введіть пароль:</h2>
        <input
          type="password"
          id="password-input"
          placeholder="Введіть пароль..."
        />
        <p id="password-error" class="error-text">Неправильний пароль!</p>

        <div class="modal-actions">
          <button id="cancel-btn">Назад</button>
          <button id="submit-btn">ОК</button>
        </div>
      </div>
    </dialog>
  </body>
</html>
