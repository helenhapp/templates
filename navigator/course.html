<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Навігатор з посиланнями на всі курси" />

    <title>WebUniverse</title>

    <!-- ❗️ Фавіконка (зараз немає) -->
    <link rel="icon" href="" />

    <!-- Скрипт перемикання теми -->
    <script>
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      const hljsThemeLink =
        savedTheme === "dark"
          ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
          : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css";

      document.write(
        `<link id="hljs-theme" rel="stylesheet" href="${hljsThemeLink}" />`,
      );
    </script>

    <!-- Підключення шрифтів (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />

    <!-- Підсвітка коду (Highlight.js) -->
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
    ></script>

    <!-- Власні стилі та скрипти -->
    <link rel="stylesheet" href="../template_01/style.css?v=2.0" />
    <link rel="stylesheet" href="./style.css?v=2.0" />
    <script src="../template_01/script.js?v=2.0" defer></script>
    <script src="./course.js" defer></script>

    <style>
        #single-course-container {
            padding: 20px;
        }
    </style>
  </head>

  <body>
    <!-- "Завіса", яка плавно зникає при завантаженні сторінки -->
    <div class="transition-curtain"></div>

    <!-- Панель з навігацією -->
    <script>
      window.pageNavLinks = [
        {
          name: "Навігатор",
          url: "./index.html",
        },
        {
          name: "Редактор",
          url: "https://editor.webuniverseua.com",
          newTab: true,
        },
      ];
    </script>
    <div id="nav-container"></div>

    <header>
      <h1></h1>
      <!-- <p class="topic">Курс з ...</p> -->
    </header>

    <main>
      <section class="accordion__item" id="single-course-container"></section>
    </main>

    <footer>
      <p>© 2026 WebUniverse — Усі права захищені.</p>
    </footer>

    <!-- Кнопка для повернення на початок сторінки -->
    <button
      id="scrollToTopBtn"
      class="scroll-to-top"
      aria-label="Повернутися нагору"
    >
      🛸
    </button>
  </body>
</html>
